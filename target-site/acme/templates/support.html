<h1>Support</h1>
<p>Submit a fictional support request. Tickets are written to a local JSONL file for lab evidence.</p>
<p class="success">{message}</p>
<form method="post" action="/support" class="form-card">
  <label>Name <input name="name" required></label>
  <label>Email <input name="email" type="email" required></label>
  <label>Category
    <select name="category">
      <option>Login issue</option>
      <option>Vendor question</option>
      <option>Shipment exception</option>
      <option>Security concern</option>
    </select>
  </label>
  <label>Message <textarea name="message" rows="5" required></textarea></label>
  <button type="submit">Create ticket</button>
</form>
