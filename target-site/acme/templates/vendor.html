<section class="page-hero vendor-hero">
  <div>
    <p class="eyebrow">Partner Tools</p>
    <h1>Vendor status lookup</h1>
    <p>Review approved supplier records and operational notes for active logistics partners.</p>
  </div>
</section>

<section class="vendor-layout">
  <form method="get" action="/vendor" class="form-card inline lookup-card">
    <label>Vendor code <input name="q" value="{query}" placeholder="northwind, contoso, globex"></label>
    <button type="submit">Search</button>
  </form>
  <section class="panel result-panel">
    <p class="tag">Lookup result</p>
    <h2>Vendor record</h2>
    <p>{result}</p>
  </section>
</section>
