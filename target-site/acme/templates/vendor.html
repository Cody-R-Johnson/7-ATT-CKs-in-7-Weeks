<h1>Vendor Lookup</h1>
<p>Search fictional vendor codes used by ACME logistics teams.</p>
<form method="get" action="/vendor" class="form-card inline">
  <label>Vendor code <input name="q" value="{query}"></label>
  <button type="submit">Search</button>
</form>
<section class="panel">
  <h2>Result</h2>
  <p>{result}</p>
</section>
